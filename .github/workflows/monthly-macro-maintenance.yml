name: Monthly macro world model maintenance

on:
  schedule:
    - cron: "20 6 3 * *" # 毎月3日 15:20 JST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monthly-macro-world-model
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY || 'monthly-macro-maintenance-secret' }}
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY || 'monthly-macro-maintenance-secret' }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      MACRO_RAW_ARCHIVE_DIR: ${{ runner.temp }}/macro_raw_archive
      MACRO_RAW_ARCHIVE_STORAGE_BACKEND: github_artifact
      MACRO_RAW_ARCHIVE_PATH_PREFIX: github-actions-artifact://macro-raw-archive
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
      TZ: Asia/Tokyo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-train.txt

      - name: Migrate database
        run: python manage.py migrate --noinput

      - name: Run monthly maintenance
        run: python manage.py monthly_macro_maintenance

      - name: Commit generated model outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            static/macro/crash_alert_backtest.csv \
            static/macro/crash_alert_backtest.json \
            static/macro/crash_probability_model.json \
            static/macro/lightgbm_prediction.json \
            static/macro/regime_probability_model.json \
            static/macro/return_forecast_model.json \
            static/macro/macro_forecast_model.json
          if git diff --cached --quiet; then
            echo "No model output changes."
            exit 0
          fi
          git commit -m "Update monthly macro world model"
          git push

      - name: Upload raw archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macro-raw-archive
          path: ${{ runner.temp }}/macro_raw_archive/*.csv.gz
          if-no-files-found: ignore

      - name: Trigger Vercel rebuild
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL is not set; skipped rebuild trigger."
            exit 0
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
