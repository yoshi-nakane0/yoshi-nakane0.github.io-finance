name: Weekly macro validation

on:
  schedule:
    - cron: "10 6 * * 6" # Saturday 15:10 JST
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: weekly-macro-validation
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY || 'weekly-macro-validation-secret' }}
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY || 'weekly-macro-validation-secret' }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
      TZ: Asia/Tokyo
    steps:
      - name: Skip without database
        if: ${{ env.DATABASE_URL == '' }}
        run: echo "DATABASE_URL is not set; skipped weekly validation."

      - name: Checkout
        if: ${{ env.DATABASE_URL != '' }}
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ env.DATABASE_URL != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: ${{ env.DATABASE_URL != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Migrate database
        if: ${{ env.DATABASE_URL != '' }}
        run: python manage.py migrate --noinput

      - name: Run weekly validation
        if: ${{ env.DATABASE_URL != '' }}
        run: python manage.py weekly_macro_validation

      - name: Trigger Vercel rebuild
        if: ${{ env.DATABASE_URL != '' }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK_URL" ]; then
            curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
          fi
