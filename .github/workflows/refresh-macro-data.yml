name: Refresh macro indicators

on:
  schedule:
    - cron: "30 5 * * *"   # 毎日 05:30 UTC（= 14:30 JST）
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: refresh-macro-indicators
  cancel-in-progress: true

jobs:
  trigger-vercel-build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Vercel daily macro build
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL secret is not set; daily macro update cannot run." >&2
            exit 1
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
          echo "Triggered Vercel daily macro build"
