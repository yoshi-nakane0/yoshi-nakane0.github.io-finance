name: Refresh macro indicators

on:
  schedule:
    - cron: "30 5 * * *"   # 毎日 05:30 UTC（= 14:30 JST）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      DATA_BRANCH: macro-data
      DJANGO_SETTINGS_MODULE: myproject.settings
      DEBUG: "True"
      SECRET_KEY: github-actions-build-only
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-prod.txt

      - name: Pull latest data DB if branch exists
        run: |
          if git ls-remote --exit-code --heads origin "$DATA_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$DATA_BRANCH" --depth=1
            git show "origin/${DATA_BRANCH}:db.sqlite3" > db.sqlite3
            echo "Loaded db.sqlite3 from origin/${DATA_BRANCH}"
          else
            echo "Branch '${DATA_BRANCH}' does not exist yet. Using bundled db.sqlite3."
          fi

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Refresh indicators
        run: python manage.py refresh_macro_data

      - name: Publish updated DB to data branch
        run: |
          cp db.sqlite3 /tmp/macro_db.sqlite3
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan "$DATA_BRANCH"
          git rm -rf --cached . > /dev/null 2>&1 || true
          cp /tmp/macro_db.sqlite3 db.sqlite3
          git add db.sqlite3
          git commit -m "Refresh macro indicators ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push --force origin "HEAD:${DATA_BRANCH}"

      - name: Trigger Vercel redeploy
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK_URL" ]; then
            curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
            echo "Triggered Vercel redeploy"
          else
            echo "VERCEL_DEPLOY_HOOK_URL secret not set; skipping redeploy trigger"
          fi
