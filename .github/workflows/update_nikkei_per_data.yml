name: Update Nikkei PER data

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: github-actions-nikkei-per-update
      DEBUG: "False"
      SQLITE_DB_PATH: /tmp/nikkei-per-update.sqlite3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Detect Chrome
        run: |
          if command -v google-chrome >/dev/null 2>&1; then
            echo "CHROME_BIN=$(command -v google-chrome)" >> $GITHUB_ENV
            exit 0
          fi
          if command -v chromium-browser >/dev/null 2>&1; then
            echo "CHROME_BIN=$(command -v chromium-browser)" >> $GITHUB_ENV
            exit 0
          fi
          if command -v chromium >/dev/null 2>&1; then
            echo "CHROME_BIN=$(command -v chromium)" >> $GITHUB_ENV
            exit 0
          fi
      - name: Update Nikkei PER data
        run: python scripts/update_nikkei_per_data.py
      - name: Run migrations
        run: python manage.py migrate --noinput
      - name: Import existing basecalc history
        run: python manage.py import_basecalc_history --input basecalc/data/basecalc_history.json || true
      - name: Finalize finance display data
        run: python manage.py finalize_finance_display_data
      - name: Publish data file
        run: |
          if git diff --quiet -- basecalc/data/nikkei_per.json explanation/data/latest_snapshot.json static/finance_data_manifest.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add basecalc/data/nikkei_per.json explanation/data/latest_snapshot.json static/finance_data_manifest.json
          git commit -m "Update Nikkei PER data"
          git push
