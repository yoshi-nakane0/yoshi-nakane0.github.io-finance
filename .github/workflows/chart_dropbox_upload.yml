name: Upload TradingView chart

on:
  schedule:
    - cron: "0 22 * * *"
    - cron: "0 3 * * *"
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:

concurrency:
  group: chart-dropbox-upload
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  chart:
    runs-on: ${{ vars.CHART_RUNNER_LABEL != '' && vars.CHART_RUNNER_LABEL || 'ubuntu-latest' }}
    timeout-minutes: 20
    env:
      AGENT_TOOLSDIRECTORY: ${{ github.workspace }}/.toolcache
      RUNNER_TOOL_CACHE: ${{ github.workspace }}/.toolcache
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Prepare toolcache
        run: mkdir -p "$GITHUB_WORKSPACE/.toolcache"
      - name: Set up Python
        if: runner.os == 'Linux'
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - name: Select Python
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            echo "PYTHON_BIN=python" >> "$GITHUB_ENV"
          else
            echo "PYTHON_BIN=$(command -v python3)" >> "$GITHUB_ENV"
          fi
      - name: Install dependencies
        run: |
          "$PYTHON_BIN" -m pip install --upgrade pip
          "$PYTHON_BIN" -m pip install -r requirements.txt
      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true
          install-dependencies: true
      - name: Validate secrets
        env:
          TRADINGVIEW_PROFILE_SOURCE_DIR: ${{ vars.TRADINGVIEW_PROFILE_DIR }}
          TRADINGVIEW_EMAIL: ${{ secrets.TRADINGVIEW_EMAIL }}
          TRADINGVIEW_PASSWORD: ${{ secrets.TRADINGVIEW_PASSWORD }}
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN || secrets.REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY || secrets.APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET || secrets.APP_SECRET }}
        run: |
          if [ -z "$TRADINGVIEW_PROFILE_SOURCE_DIR" ]; then
            test -n "$TRADINGVIEW_EMAIL" || { echo "TRADINGVIEW_EMAIL is required." >&2; exit 1; }
            test -n "$TRADINGVIEW_PASSWORD" || { echo "TRADINGVIEW_PASSWORD is required." >&2; exit 1; }
          fi
          if [ -n "$DROPBOX_REFRESH_TOKEN" ]; then
            test -n "$DROPBOX_APP_KEY" || { echo "DROPBOX_APP_KEY is required with DROPBOX_REFRESH_TOKEN." >&2; exit 1; }
            test -n "$DROPBOX_APP_SECRET" || { echo "DROPBOX_APP_SECRET is required with DROPBOX_REFRESH_TOKEN." >&2; exit 1; }
            curl -fsS https://api.dropboxapi.com/oauth2/token \
              --data-urlencode "grant_type=refresh_token" \
              --data-urlencode "refresh_token=$DROPBOX_REFRESH_TOKEN" \
              --data-urlencode "client_id=$DROPBOX_APP_KEY" \
              --data-urlencode "client_secret=$DROPBOX_APP_SECRET" \
              -o /dev/null || {
                echo "DROPBOX_REFRESH_TOKEN authentication failed. Check DROPBOX_REFRESH_TOKEN / DROPBOX_APP_KEY / DROPBOX_APP_SECRET." >&2
                exit 1
              }
            exit 0
          fi
          test -n "$DROPBOX_ACCESS_TOKEN" || { echo "Set DROPBOX_REFRESH_TOKEN + DROPBOX_APP_KEY + DROPBOX_APP_SECRET, or set DROPBOX_ACCESS_TOKEN." >&2; exit 1; }
          curl -fsS -X POST https://api.dropboxapi.com/2/users/get_current_account \
            -H "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
            -o /dev/null || {
              echo "DROPBOX_ACCESS_TOKEN is invalid or expired. Update the GitHub Secret or configure DROPBOX_REFRESH_TOKEN + DROPBOX_APP_KEY + DROPBOX_APP_SECRET." >&2
              exit 1
            }
      - name: Upload chart screenshots to Dropbox
        env:
          CHART_HEADLESS: "0"
          CHART_REQUIRE_CONFIRMATION: "0"
          CHART_USER_DATA_DIR: ${{ github.workspace }}/.chart-profile-ci
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          TZ: Asia/Tokyo
          TRADINGVIEW_PROFILE_SOURCE_DIR: ${{ vars.TRADINGVIEW_PROFILE_DIR }}
          TRADINGVIEW_REQUIRE_AUTHENTICATED_PROFILE: "0"
          TRADINGVIEW_EMAIL: ${{ secrets.TRADINGVIEW_EMAIL }}
          TRADINGVIEW_PASSWORD: ${{ secrets.TRADINGVIEW_PASSWORD }}
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN || secrets.REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY || secrets.APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET || secrets.APP_SECRET }}
          DROPBOX_UPLOAD_DIR: /trade/AI/ChartData
        run: |
          if [ -n "$TRADINGVIEW_PROFILE_SOURCE_DIR" ]; then
            rm -rf "$CHART_USER_DATA_DIR"
            mkdir -p "$CHART_USER_DATA_DIR"
            cp -R "$TRADINGVIEW_PROFILE_SOURCE_DIR"/. "$CHART_USER_DATA_DIR"/
            export TRADINGVIEW_REQUIRE_AUTHENTICATED_PROFILE=1
          fi
          mkdir -p "$CHART_USER_DATA_DIR"
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a --server-args="-screen 0 1920x1080x24" "$PYTHON_BIN" scripts/Chart.py
          else
            "$PYTHON_BIN" scripts/Chart.py
          fi
