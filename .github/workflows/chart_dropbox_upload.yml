name: Capture TradingView chart

on:
  schedule:
    - cron: "0 22 * * *"
    - cron: "0 3 * * *"
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:

concurrency:
  group: chart-capture
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  chart:
    runs-on: ${{ vars.CHART_RUNNER_LABEL != '' && vars.CHART_RUNNER_LABEL || 'ubuntu-latest' }}
    timeout-minutes: 20
    env:
      AGENT_TOOLSDIRECTORY: ${{ github.workspace }}/.toolcache
      RUNNER_TOOL_CACHE: ${{ github.workspace }}/.toolcache
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Prepare toolcache
        run: mkdir -p "$GITHUB_WORKSPACE/.toolcache"
      - name: Set up Python
        if: runner.os == 'Linux'
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - name: Select Python
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            echo "PYTHON_BIN=python" >> "$GITHUB_ENV"
          else
            echo "PYTHON_BIN=$(command -v python3)" >> "$GITHUB_ENV"
          fi
      - name: Install dependencies
        run: |
          "$PYTHON_BIN" -m pip install --upgrade pip
          "$PYTHON_BIN" -m pip install -r requirements.txt
      - name: Set up Chrome
        if: runner.os == 'Linux'
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true
          install-dependencies: true
      - name: Run TradingView chart capture
        env:
          PYTHONUNBUFFERED: "1"
          TZ: Asia/Tokyo
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a --server-args="-screen 0 1920x1080x24" "$PYTHON_BIN" scripts/Chart.py
          else
            "$PYTHON_BIN" scripts/Chart.py
          fi
