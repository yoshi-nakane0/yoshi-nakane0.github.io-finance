name: sync-basecalc-futures

on:
  schedule:
    - cron: "30 23 * * 0-4" # Weekdays 08:30 JST (Sun-Thu UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-basecalc-futures
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: github-actions-basecalc-futures-sync
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      SQLITE_DB_PATH: /tmp/basecalc-futures-sync.sqlite3
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run migrations
        run: python manage.py migrate --noinput
      - name: Import existing basecalc history
        run: python manage.py import_basecalc_history --input basecalc/data/basecalc_history.json || true
      - name: Sync Nikkei futures daily data
        id: sync_futures
        run: |
          set -o pipefail
          python manage.py sync_nikkei_futures_daily \
            --export-history \
            --export-path basecalc/data/basecalc_history.json \
            --export-snapshot-path basecalc/data/latest_snapshot.json \
            | tee /tmp/sync_nikkei_futures_daily.log
          status="$(sed -n 's/.*status=\([^,]*\),.*/\1/p' /tmp/sync_nikkei_futures_daily.log | tail -1)"
          echo "status=${status:-unknown}" >> "$GITHUB_OUTPUT"
      - name: Finalize finance display data
        run: python manage.py finalize_finance_display_data --evaluate-outcomes
      - name: Check explanation integrity
        run: python manage.py check_explanation_integrity
      - name: Check basecalc data integrity
        run: python manage.py check_basecalc_data_integrity
      - name: Commit basecalc data
        run: |
          if git diff --quiet -- basecalc/data/basecalc_history.json basecalc/data/basecalc_status.json basecalc/data/latest_snapshot.json explanation/data/latest_snapshot.json explanation/data/snapshot_history.json explanation/data/trade_outcomes.json static/finance_data_manifest.json; then
            echo "No basecalc futures data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add basecalc/data/basecalc_history.json basecalc/data/basecalc_status.json basecalc/data/latest_snapshot.json explanation/data/latest_snapshot.json explanation/data/snapshot_history.json explanation/data/trade_outcomes.json static/finance_data_manifest.json
          if [ "${{ steps.sync_futures.outputs.status }}" = "failed" ]; then
            git commit -m "Record failed basecalc futures sync"
          else
            git commit -m "Sync basecalc futures data"
          fi
          git push
      - name: Fail if futures sync failed
        if: steps.sync_futures.outputs.status == 'failed'
        run: |
          echo "Nikkei futures sync failed. Check the Sync Nikkei futures daily data step for source diagnostics."
          exit 1
