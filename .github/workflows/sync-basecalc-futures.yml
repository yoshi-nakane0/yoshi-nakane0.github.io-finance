name: sync-basecalc-futures

on:
  schedule:
    - cron: "30 23 * * 1-5" # Weekdays 08:30 JST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-basecalc-futures
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: github-actions-basecalc-futures-sync
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      SQLITE_DB_PATH: /tmp/basecalc-futures-sync.sqlite3
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install PDF text helper
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Run migrations
        run: python manage.py migrate --noinput
      - name: Import existing basecalc history
        run: python manage.py import_basecalc_history --input basecalc/data/basecalc_history.json || true
      - name: Sync Nikkei futures daily data
        run: python manage.py sync_nikkei_futures_daily --export-history --export-path basecalc/data/basecalc_history.json
      - name: Check basecalc data integrity
        run: python manage.py check_basecalc_data_integrity
      - name: Commit basecalc data
        run: |
          if git diff --quiet -- basecalc/data/basecalc_history.json basecalc/data/basecalc_status.json; then
            echo "No basecalc futures data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add basecalc/data/basecalc_history.json basecalc/data/basecalc_status.json
          git commit -m "Sync basecalc futures data"
          git push
