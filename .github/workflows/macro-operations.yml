name: Macro operations

"on":
  schedule:
    - cron: "30 5 * * *"   # 毎日 14:30 JST
    - cron: "10 6 * * 6"   # Saturday 15:10 JST
    - cron: "20 6 3 * *"   # 毎月3日 15:20 JST
  workflow_dispatch:
    inputs:
      operation:
        description: "Macro operation to run"
        required: true
        default: all
        type: choice
        options:
          - all
          - daily
          - weekly
          - monthly

permissions:
  contents: write

jobs:
  daily-refresh:
    if: >-
      ${{
        (github.event_name == 'schedule' && github.event.schedule == '30 5 * * *') ||
        (github.event_name == 'workflow_dispatch' && (inputs.operation == 'daily' || inputs.operation == 'all'))
    }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: refresh-macro-indicators
      cancel-in-progress: true
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY || 'daily-macro-refresh-secret' }}
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY || 'daily-macro-refresh-secret' }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      SQLITE_DB_PATH: runtime/db.sqlite3
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
      TZ: Asia/Tokyo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate macro payload
        run: |
          mkdir -p runtime static/macro
          python manage.py migrate --noinput
          python manage.py refresh_macro_data
          python manage.py compute_world_state
          python manage.py settle_forecast_snapshots
          python manage.py precompute_dashboard
          python manage.py export_macro_payload --output static/macro/latest_dashboard.json

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/macro/latest_dashboard.json runtime/db.sqlite3 static/macro/*.json
          if git diff --cached --quiet; then
            echo "No generated data changes."
            exit 0
          fi
          git commit -m "Update macro generated data"
          git push

      - name: Trigger Vercel deploy
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL secret is not set; skipped deploy trigger."
            exit 0
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"

  weekly-validation:
    if: >-
      ${{
        (github.event_name == 'schedule' && github.event.schedule == '10 6 * * 6') ||
        (github.event_name == 'workflow_dispatch' && (inputs.operation == 'weekly' || inputs.operation == 'all'))
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: weekly-macro-validation
      cancel-in-progress: true
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY || 'weekly-macro-validation-secret' }}
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY || 'weekly-macro-validation-secret' }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
      TZ: Asia/Tokyo
    steps:
      - name: Skip without database
        if: ${{ env.DATABASE_URL == '' }}
        run: echo "DATABASE_URL is not set; skipped weekly validation."

      - name: Checkout
        if: ${{ env.DATABASE_URL != '' }}
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ env.DATABASE_URL != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: ${{ env.DATABASE_URL != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Migrate database
        if: ${{ env.DATABASE_URL != '' }}
        run: python manage.py migrate --noinput

      - name: Run weekly validation
        if: ${{ env.DATABASE_URL != '' }}
        run: python manage.py weekly_macro_validation

      - name: Trigger Vercel rebuild
        if: ${{ env.DATABASE_URL != '' }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK_URL" ]; then
            curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
          fi

  monthly-maintenance:
    if: >-
      ${{
        (github.event_name == 'schedule' && github.event.schedule == '20 6 3 * *') ||
        (github.event_name == 'workflow_dispatch' && (inputs.operation == 'monthly' || inputs.operation == 'all'))
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: monthly-macro-world-model
      cancel-in-progress: false
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY || 'monthly-macro-maintenance-secret' }}
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY || 'monthly-macro-maintenance-secret' }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      MACRO_RAW_ARCHIVE_DIR: /tmp/macro_raw_archive
      MACRO_RAW_ARCHIVE_STORAGE_BACKEND: github_artifact
      MACRO_RAW_ARCHIVE_PATH_PREFIX: github-actions-artifact://macro-raw-archive
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
      TZ: Asia/Tokyo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-train.txt

      - name: Migrate database
        run: python manage.py migrate --noinput

      - name: Run monthly maintenance
        run: python manage.py monthly_macro_maintenance

      - name: Commit generated model outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            static/macro/crash_alert_backtest.csv \
            static/macro/crash_alert_backtest.json \
            static/macro/crash_probability_model.json \
            static/macro/lightgbm_prediction.json \
            static/macro/regime_probability_model.json \
            static/macro/return_forecast_model.json \
            static/macro/macro_forecast_model.json
          if git diff --cached --quiet; then
            echo "No model output changes."
            exit 0
          fi
          git commit -m "Update monthly macro world model"
          git push

      - name: Upload raw archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macro-raw-archive
          path: /tmp/macro_raw_archive/*.csv.gz
          if-no-files-found: ignore

      - name: Trigger Vercel rebuild
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL is not set; skipped rebuild trigger."
            exit 0
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
