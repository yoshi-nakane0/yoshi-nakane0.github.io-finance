name: Macro operations

"on":
  schedule:
    - cron: "30 5 * * *"   # 毎日 14:30 JST
    - cron: "10 6 * * 6"   # Saturday 15:10 JST
  workflow_dispatch:
    inputs:
      operation:
        description: "Macro operation to run"
        required: true
        default: all
        type: choice
        options:
          - all
          - daily
          - weekly

permissions:
  contents: write

jobs:
  daily-refresh:
    if: >-
      ${{
        (github.event_name == 'schedule' && github.event.schedule == '30 5 * * *') ||
        (github.event_name == 'workflow_dispatch' && (inputs.operation == 'daily' || inputs.operation == 'all'))
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: refresh-macro-indicators
      cancel-in-progress: true
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY || 'daily-macro-refresh-secret' }}
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY || 'daily-macro-refresh-secret' }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      SQLITE_DB_PATH: runtime/db.sqlite3
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
      TZ: Asia/Tokyo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate macro payload
        run: |
          mkdir -p runtime static/macro
          python manage.py migrate --noinput
          python manage.py refresh_macro_data
          python manage.py compute_world_state
          python manage.py run_macro_forecast
          python manage.py settle_forecast_snapshots
          python manage.py run_model_validation
          python manage.py export_macro_payload --output static/macro/latest_dashboard.json
          python manage.py export_macro_house_view --output static/macro/house_view.json
          python manage.py export_macro_quality --output static/macro/data_quality_report.json
          python manage.py export_macro_forecast_ledger --output static/macro/forecast_ledger.json
          python manage.py export_macro_scenarios --output static/macro/scenario_ledger.json
          python manage.py export_macro_model_validation --output static/macro/model_validation_report.json
          python manage.py export_macro_model_cards --output static/macro/model_cards.json
          python manage.py export_macro_operations_status --output static/macro/operations_status.json
          python manage.py export_macro_goldman_outlook --output static/macro/goldman_outlook_comparison.json
          python manage.py export_macro_house_view_validation --output static/macro/house_view_validation.json --source-payload static/macro/latest_dashboard.json
          python manage.py export_macro_vintage_quality --output static/macro/vintage_quality_report.json
          python manage.py export_macro_validation_weights --output static/macro/validation_weights.json
          python manage.py finalize_finance_display_data --evaluate-outcomes
          python manage.py check_explanation_integrity

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/macro/*.json explanation/data/latest_snapshot.json explanation/data/snapshot_history.json explanation/data/trade_outcomes.json static/finance_data_manifest.json staticfiles/finance_data_manifest.json
          if git diff --cached --quiet; then
            echo "No generated data changes."
            exit 0
          fi
          git commit -m "Update macro generated data"
          git push

      - name: Trigger Vercel deploy
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL secret is not set; skipped deploy trigger."
            exit 0
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"

  weekly-validation:
    if: >-
      ${{
        (github.event_name == 'schedule' && github.event.schedule == '10 6 * * 6') ||
        (github.event_name == 'workflow_dispatch' && (inputs.operation == 'weekly' || inputs.operation == 'all'))
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: weekly-macro-validation
      cancel-in-progress: true
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY || 'weekly-macro-validation-secret' }}
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY || 'weekly-macro-validation-secret' }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SQLITE_DB_PATH: runtime/db.sqlite3
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
      TZ: Asia/Tokyo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python without database
        if: ${{ env.DATABASE_URL == '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies without database
        if: ${{ env.DATABASE_URL == '' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write validation warning without database
        if: ${{ env.DATABASE_URL == '' }}
        run: |
          mkdir -p runtime static/macro
          cat > static/macro/model_validation_report.json <<'JSON'
          {
            "freshness": {
              "latest_evaluated_at": null,
              "age_days": null,
              "stale_after_days": 30,
              "is_stale": true
            },
            "model_validation_report": [],
            "status": "stale",
            "warnings": [
              "DATABASE_URL is not set; weekly validation was not executed."
            ]
          }
          JSON
          cat > static/macro/model_cards.json <<'JSON'
          {
            "model_cards": [],
            "status": "blocked",
            "warnings": [
              "model cards = 0",
              "DATABASE_URL is not set; weekly validation was not executed."
            ]
          }
          JSON
          python manage.py migrate --noinput
          python manage.py finalize_finance_display_data --evaluate-outcomes
          python manage.py check_explanation_integrity

      - name: Commit validation warning
        if: ${{ env.DATABASE_URL == '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/macro/model_validation_report.json static/macro/model_cards.json explanation/data/latest_snapshot.json explanation/data/snapshot_history.json explanation/data/trade_outcomes.json static/finance_data_manifest.json staticfiles/finance_data_manifest.json
          if git diff --cached --quiet; then
            echo "No validation warning changes."
            exit 0
          fi
          git commit -m "Mark weekly macro validation skipped"
          git push

      - name: Set up Python
        if: ${{ env.DATABASE_URL != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: ${{ env.DATABASE_URL != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Migrate database
        if: ${{ env.DATABASE_URL != '' }}
        run: python manage.py migrate --noinput

      - name: Run weekly validation
        if: ${{ env.DATABASE_URL != '' }}
        run: |
          python manage.py weekly_macro_validation
          python manage.py run_macro_forecast
          python manage.py settle_forecast_snapshots
          python manage.py run_model_validation
          python manage.py export_macro_forecast_ledger --output static/macro/forecast_ledger.json
          python manage.py export_macro_model_validation --output static/macro/model_validation_report.json
          python manage.py export_macro_model_cards --output static/macro/model_cards.json
          python manage.py export_macro_house_view_validation --output static/macro/house_view_validation.json
          python manage.py export_macro_validation_weights --output static/macro/validation_weights.json
          python manage.py finalize_finance_display_data --evaluate-outcomes
          python manage.py check_explanation_integrity

      - name: Commit weekly forecast ledger
        if: ${{ env.DATABASE_URL != '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/macro/*.json explanation/data/latest_snapshot.json explanation/data/snapshot_history.json explanation/data/trade_outcomes.json static/finance_data_manifest.json staticfiles/finance_data_manifest.json
          if git diff --cached --quiet; then
            echo "No weekly forecast ledger changes."
            exit 0
          fi
          git commit -m "Update weekly macro forecast ledger"
          git push

      - name: Trigger Vercel rebuild
        if: ${{ env.DATABASE_URL != '' }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK_URL" ]; then
            curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
          fi
